<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Sources</title>

<style>

body{
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #3d3c3c;
}

h2{
 color: white;
 font-size: 2rem;

}
.image-box{
    margin: 40px auto;
}

img{
    border-radius: 15px;
    width:800px;
    border-radius:10px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

img:hover{
    transform: scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform: translateY(20px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

.image-box{
    animation: fadeIn 1.5s ease;
}
</style>

</head>

<body>

<div class="image-box">
<h2>Nurture Path Foods</h2>
<img src="first.jpg">
</div>

<div class="image-box">
<h2></h2>
<img src="second.jpeg">
</div>

</body>
</html>
