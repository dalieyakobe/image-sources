<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Sources</title>

<style>

 body{
    margin:0;
    font-family: Arial, sans-serif;

    /* background image stays */
    background-image:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("first.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;

    padding:20px;
}

/* images */
img{
    width:85%;
    max-width:700px;
    margin:40px auto;
    border-radius:16px;
    border:4px solid white;

    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

img:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

p{
    color:white;
    font-size:22px;
    font-weight:bold;
}


/* MOBILE ADJUSTMENTS */
@media (max-width:600px){

body{
    padding:15px;

    /* background still visible but scaled better */
    background-size:cover;
    background-position:center;
}

img{
    width:95%;
    max-width:95%;
    margin:20px auto;
}

p{
    font-size:18px;
}

}
</style>

</head>

<body>

<p>Nurture Path Foods</p>
<img src="first.jpg">

<p>Second Image</p>
<img src="second.jpeg">

</body>

</html>
